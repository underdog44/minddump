<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="MindDump"/>
<meta name="theme-color" content="#0c0c0c"/>
<title>MindDump</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --k:#0c0c0c;--k2:#111111;--k3:#171717;--k4:#1f1f1f;--k5:#282828;--k6:#333333;
  --w1:rgba(255,255,255,0.04);--w2:rgba(255,255,255,0.07);--w3:rgba(255,255,255,0.11);--w4:rgba(255,255,255,0.18);
  --t1:#f0f0f0;--t2:#b8b8b8;--t3:#787878;--t4:#484848;
  --c1:#b87a5a;--c2:#8a9e7a;--c3:#7a8eaa;--c4:#9a7aaa;--c5:#aa7a7a;
  --ok:#7ecfb0;--red:#e8a0b4;
  --r:13px;--rsm:8px;--rxl:18px;
  --D:"Cormorant Garamond",Georgia,serif;
  --B:"Inter",system-ui,sans-serif;
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --safe-top:env(safe-area-inset-top,0px);
}

/* ── EXACT v3base skeleton — do not change these four rules ── */
html,body{height:100%;background:var(--k);color:var(--t1);font-family:var(--B);-webkit-font-smoothing:antialiased;overflow:hidden}
#app{height:100vh;display:flex;flex-direction:column}
.main-area{flex:1;display:flex;overflow:hidden;min-height:0}
.center{flex:1;display:flex;flex-direction:column;min-width:0;min-height:0;overflow:hidden}

/* TOP BAR */
.topbar{display:flex;align-items:center;padding:12px 16px 10px;padding-top:calc(12px + var(--safe-top));border-bottom:1px solid var(--w2);flex-shrink:0;background:var(--k);gap:10px}
.greeting{font-family:var(--D);font-size:17px;font-weight:300;flex:1;letter-spacing:0.4px;color:var(--t2)}
.greeting em{color:var(--t3);font-style:italic;font-weight:300}
.ibtn{width:32px;height:32px;border-radius:8px;border:1px solid var(--w2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t4);background:transparent;flex-shrink:0}

/* PAGE HEADER */
.pgbar{padding:13px 18px 10px;display:flex;align-items:baseline;gap:10px;flex-shrink:0;border-bottom:1px solid var(--w2)}
.pgname{font-family:var(--D);font-size:23px;font-weight:300;letter-spacing:0.4px;flex:1;color:var(--t1)}
.pill{font-size:10.5px;padding:4px 12px;border-radius:20px;border:1px solid var(--w2);background:transparent;color:var(--t4);cursor:pointer;font-family:var(--B)}
.pill.on{background:var(--k4);color:var(--t2);border-color:var(--w3)}

/* CARDS AREA — the one scroll container */
.cards-area{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.cards-area::-webkit-scrollbar{width:0}

/* CHAT PANEL */
.chat-panel{width:100%;border-left:none;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.chat-tabs{display:flex;border-bottom:1px solid var(--w2);flex-shrink:0}
.ctab{flex:1;padding:11px 4px;text-align:center;font-size:11px;color:var(--t4);cursor:pointer;border-bottom:2px solid transparent;font-weight:400}
.ctab.on{color:var(--t2);border-bottom-color:var(--t3)}
.chat-pane{display:none;flex-direction:column;flex:1;overflow:hidden;min-height:0}
.chat-pane.on{display:flex}
.msgs{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px;display:flex;flex-direction:column;gap:7px;overscroll-behavior:contain}
.msgs::-webkit-scrollbar{width:0}
.cm{max-width:92%}
.cu{align-self:flex-end}.ca{align-self:flex-start}
.cb{padding:8px 11px;border-radius:12px;font-size:12px;line-height:1.55;word-break:break-word}
.cu .cb{background:var(--k5);color:var(--t2);border-bottom-right-radius:3px;border:1px solid var(--w3)}
.ca .cb{background:var(--k3);color:var(--t2);border-bottom-left-radius:3px;border:1px solid var(--w2)}
.ca .cb b{color:var(--ok)}
.ct{font-size:9px;color:var(--t4);margin-top:2px}
.cu .ct{text-align:right}
.typing{display:flex;gap:3px;align-items:center;padding:8px 11px}
.dt{width:4px;height:4px;border-radius:50%;background:var(--k6);animation:dta 1.3s infinite}
.dt:nth-child(2){animation-delay:.2s}.dt:nth-child(3){animation-delay:.4s}
@keyframes dta{0%,100%{opacity:0.25;transform:translateY(0)}50%{opacity:0.7;transform:translateY(-3px)}}
.cia{padding:8px 10px;border-top:1px solid var(--w2);flex-shrink:0}
.ibox{background:var(--k3);border:1px solid var(--w2);border-radius:12px;display:flex;align-items:flex-end;gap:6px;padding:7px 10px}
.ibox:focus-within{border-color:var(--w3)}
.cin{flex:1;background:transparent;border:none;outline:none;font-size:12.5px;color:var(--t2);resize:none;max-height:80px;font-family:var(--B);line-height:1.5;font-weight:300;overflow-y:auto}
.cin::placeholder{color:var(--t4);opacity:0.5}
.sbtn,.micbtn{width:26px;height:26px;border-radius:7px;background:var(--k4);border:1px solid var(--w2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--t4)}
.sbtn:disabled{opacity:0.3}
.tt-row{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:var(--rsm);background:var(--k2);border:1px solid var(--w2);margin-bottom:6px}
.tt-ck{width:15px;height:15px;border-radius:3px;border:1px solid var(--w3);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center}
.tt-ck.ck{background:var(--t3);border-color:var(--t3)}
.tt-ck svg{opacity:0}.tt-ck.ck svg{opacity:1}
.tt-txt{font-size:12.5px;color:var(--t2);flex:1;line-height:1.4;font-weight:300}
.tt-txt.dn{text-decoration:line-through;opacity:0.3}
.tt-del{background:none;border:none;color:var(--t4);cursor:pointer;font-size:16px;padding:0 4px;line-height:1;font-family:var(--B)}

/* MOBILE — exact v3base */
@media(max-width:768px){
  .center{display:none}
  .chat-panel{display:none}
  .mobile-tabs{display:flex!important}
  .center.mobile-active{display:flex}
  .chat-panel.mobile-active{display:flex}
}
/* MOBILE TABS — exact v3base: direct child of #app, flex-shrink:0, padding-bottom safe area */
.mobile-tabs{display:none;border-top:1px solid var(--w2);background:var(--k2);flex-shrink:0;padding-bottom:var(--safe-bottom)}
.mtab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 2px;cursor:pointer;font-size:9px;letter-spacing:0.3px;text-transform:uppercase;color:var(--t4);border:none;background:transparent;font-family:var(--B);font-weight:500}
.mtab.on{color:var(--t1)}

/* CONTENT STYLES */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.sc{background:var(--k2);border:1px solid var(--w2);border-radius:var(--rsm);padding:10px 12px;text-align:center}
.sn{font-size:22px;font-family:var(--D);font-weight:300;color:var(--t1)}
.sl{font-size:9px;letter-spacing:0.8px;text-transform:uppercase;color:var(--t4);margin-top:2px}
.tb{background:var(--k2);border:1px solid var(--w2);border-radius:var(--r);overflow:hidden}
.tbh{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--w2)}
.tbt{font-family:var(--D);font-size:15px;font-weight:300;flex:1;letter-spacing:0.3px}
.tbd{font-size:10px;color:var(--t4)}
.tbl{padding:10px 14px;display:flex;flex-direction:column;gap:5px;min-height:36px}
.tir{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--w1)}
.tir:last-child{border-bottom:none}
.tck{width:14px;height:14px;border-radius:3px;border:1px solid var(--w3);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center}
.tck.ck{background:var(--t3);border-color:var(--t3)}
.tck svg{opacity:0}.tck.ck svg{opacity:1}
.tit{font-size:12.5px;color:var(--t2);flex:1;line-height:1.4;font-weight:300}
.tit.dn{text-decoration:line-through;opacity:0.3}
.tdl{opacity:0;color:var(--t4);cursor:pointer;background:none;border:none;padding:2px 6px;font-size:16px;font-family:var(--B);line-height:1}
.tir:hover .tdl,.tir:active .tdl{opacity:0.5}
.ov-bar{background:rgba(232,160,180,0.05);border:1px solid rgba(232,160,180,0.13);border-radius:var(--rsm);padding:8px 13px;font-size:12px;color:var(--red);cursor:pointer}
.gc{background:var(--k2);border:1px solid var(--w2);border-radius:var(--r);overflow:hidden}
.gh{display:flex;align-items:center;gap:9px;padding:10px 14px;cursor:pointer;user-select:none;border-bottom:1px solid var(--w2)}
.gc.col .gh{border-bottom:none}
.glbl{font-size:10px;letter-spacing:0.8px;text-transform:uppercase;font-weight:500;flex:1}
.gcnt{font-size:10px;color:var(--t4)}
.gchev{color:var(--t4);transition:transform 0.2s;flex-shrink:0}
.gc.col .gchev{transform:rotate(-90deg)}
.gc.col .gitems{display:none}
.gi{display:flex;align-items:flex-start;gap:9px;padding:9px 14px;border-bottom:1px solid var(--w1)}
.gi:last-child{border-bottom:none}
.gbul{width:3px;height:3px;border-radius:50%;background:var(--w4);flex-shrink:0;margin-top:9px}
.gbody{flex:1;min-width:0}
.gtxt{font-size:13px;line-height:1.5;color:var(--t2);font-weight:300}
.gtime{font-size:10.5px;color:var(--t4);margin-top:3px}
.gact{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.ab{font-size:10.5px;padding:3px 10px;border-radius:20px;border:1px solid var(--w2);background:transparent;color:var(--t4);cursor:pointer;font-family:var(--B)}
.td-section{background:var(--k2);border:1px solid var(--w2);border-radius:var(--r);overflow:hidden}
.td-sh{display:flex;align-items:baseline;gap:10px;padding:12px 15px;border-bottom:1px solid var(--w2)}
.td-sl{font-size:10px;letter-spacing:0.8px;text-transform:uppercase;color:var(--t3);font-weight:500;flex:1}
.td-sd{font-size:10px;color:var(--t4)}
.td-item{display:flex;align-items:flex-start;gap:12px;padding:11px 15px;border-bottom:1px solid var(--w1)}
.td-item:last-child{border-bottom:none}
.td-past{opacity:0.45}
.td-time{font-size:11.5px;color:var(--t3);width:52px;flex-shrink:0;padding-top:2px;font-weight:400}
.td-line{width:2px;border-radius:2px;min-height:36px;flex-shrink:0;opacity:0.5}
.td-body{flex:1;min-width:0}
.td-title{font-size:13.5px;color:var(--t1);line-height:1.4;font-weight:300}
.td-bucket{font-size:10px;letter-spacing:0.6px;text-transform:uppercase;margin-top:3px;opacity:0.7}
.td-acts{display:flex;gap:4px;margin-top:7px;flex-wrap:wrap}
.jwrite{background:var(--k2);border:1px solid var(--w2);border-radius:var(--r);overflow:hidden}
.jdate{font-size:9px;letter-spacing:1.3px;text-transform:uppercase;color:var(--t4);padding:13px 16px 0}
.jhead-in{width:100%;background:transparent;border:none;outline:none;font-size:19px;color:var(--t1);font-family:var(--D);font-weight:300;letter-spacing:0.3px;padding:8px 16px 0;display:block}
.jhead-in::placeholder{color:var(--t4);opacity:0.3;font-style:italic}
.jdiv{height:1px;background:var(--w2);margin:10px 16px 0}
.jbody-in{width:100%;background:transparent;border:none;outline:none;font-size:14px;color:var(--t2);font-family:var(--D);font-weight:300;line-height:1.85;resize:none;display:block;padding:12px 16px 14px;letter-spacing:0.15px;min-height:180px;max-height:45vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.jbody-in::placeholder{color:var(--t4);opacity:0.22;font-style:italic}
.jftr{display:flex;justify-content:flex-end;padding:8px 14px;border-top:1px solid var(--w2)}
.jsave{font-size:11px;padding:5px 16px;border-radius:20px;border:1px solid var(--w3);background:transparent;color:var(--t3);cursor:pointer;font-family:var(--B)}
.jlbl{font-size:9px;letter-spacing:1.4px;text-transform:uppercase;color:var(--t4);padding:4px 0}
.je-card{background:var(--k2);border:1px solid var(--w2);border-radius:var(--r);padding:13px 15px;cursor:pointer}
.je-date{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--t4);margin-bottom:5px}
.je-title{font-size:15px;font-family:var(--D);font-weight:300;color:var(--t1);margin-bottom:4px}
.je-preview{font-size:12px;color:var(--t4);line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.sg{background:var(--k2);border:1px solid var(--w2);border-radius:var(--r);overflow:hidden}
.sgh{font-size:9px;letter-spacing:1.4px;text-transform:uppercase;color:var(--t4);padding:10px 14px 6px}
.sr{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--w1);font-size:12.5px}
.sr:last-child{border-bottom:none}
.srl{flex:1;color:var(--t2);font-weight:300}
.srs{font-size:11px;color:var(--t4);margin-top:2px}
.tog{width:40px;height:22px;border-radius:11px;background:var(--k5);border:1px solid var(--w2);cursor:pointer;position:relative;transition:background 0.2s;flex-shrink:0}
.tog.on{background:var(--c3)}
.tog::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:2px;left:2px;transition:transform 0.2s}
.tog.on::after{transform:translateX(18px)}
.sett-lbl{font-family:var(--D);font-size:22px;font-weight:300;letter-spacing:0.3px;color:var(--t1);padding:4px 0 12px}
.em{text-align:center;padding:40px 20px;color:var(--t4);font-family:var(--D);font-size:15px;font-weight:300;letter-spacing:0.3px;font-style:italic}
.voice-overlay{position:fixed;inset:0;background:rgba(10,10,10,0.97);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px}
.voice-overlay.h{display:none}
.waveform{display:flex;align-items:center;gap:4px;height:60px}
.wbar{width:4px;border-radius:4px;background:var(--t3);animation:wb 0.8s ease-in-out infinite;transform-origin:center}
.wbar:nth-child(1){height:12px;animation-delay:0s}.wbar:nth-child(2){height:20px;animation-delay:0.1s}.wbar:nth-child(3){height:35px;animation-delay:0.2s}.wbar:nth-child(4){height:50px;animation-delay:0.3s}.wbar:nth-child(5){height:60px;animation-delay:0.4s}.wbar:nth-child(6){height:50px;animation-delay:0.3s}.wbar:nth-child(7){height:35px;animation-delay:0.2s}.wbar:nth-child(8){height:20px;animation-delay:0.1s}.wbar:nth-child(9){height:12px;animation-delay:0s}
@keyframes wb{0%,100%{transform:scaleY(0.3);opacity:0.4}50%{transform:scaleY(1);opacity:1}}
.voice-label{font-family:var(--D);font-size:18px;font-weight:300;color:var(--t2);letter-spacing:0.5px}
.voice-transcript{font-size:13px;color:var(--t3);max-width:260px;text-align:center;line-height:1.5;min-height:20px;font-weight:300}
.voice-cancel{font-size:11px;padding:8px 24px;border-radius:20px;border:1px solid var(--w3);background:transparent;color:var(--t4);cursor:pointer;font-family:var(--B)}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,0.72);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.mbg.h{display:none}
.mdl{background:var(--k2);border:1px solid var(--w3);border-radius:var(--rxl);padding:20px;width:100%;max-width:370px}
.mdl h3{font-family:var(--D);font-size:19px;font-weight:300;margin-bottom:14px;letter-spacing:0.3px}
.mfl{margin-bottom:10px}
.mfl label{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--t4);display:block;margin-bottom:4px;font-weight:500}
.mi{width:100%;background:var(--k4);border:1px solid var(--w2);border-radius:var(--rsm);padding:8px 11px;font-size:12.5px;color:var(--t2);font-family:var(--B);outline:none;font-weight:300}
.mi:focus{border-color:var(--w4)}
select.mi{cursor:pointer;-webkit-appearance:none}
select.mi option{background:var(--k3)}
.mbtns{display:flex;gap:7px;justify-content:flex-end;margin-top:14px}
.mbc{padding:8px 16px;border-radius:8px;font-size:12px;cursor:pointer;border:1px solid var(--w2);background:transparent;color:var(--t4);font-family:var(--B)}
.mbs{padding:8px 16px;border-radius:8px;font-size:12px;cursor:pointer;border:1px solid var(--w3);background:var(--k4);color:var(--t2);font-family:var(--B)}
.je-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(10px);z-index:300;display:flex;flex-direction:column;padding-top:calc(60px + var(--safe-top))}
.je-modal-bg.h{display:none}
.je-modal{background:var(--k2);flex:1;overflow:hidden;display:flex;flex-direction:column;border-radius:var(--rxl) var(--rxl) 0 0}
.je-modal-top{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid var(--w2);flex-shrink:0}
.je-modal-close{width:30px;height:30px;border-radius:8px;border:1px solid var(--w2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t4);background:transparent;font-size:16px}
.je-modal-date{flex:1;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--t4);margin-left:12px}
.je-modal-edit{font-size:11px;padding:4px 14px;border-radius:20px;border:1px solid var(--w2);background:transparent;color:var(--t3);cursor:pointer;font-family:var(--B)}
.je-modal-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 20px}
.je-modal-h{font-size:24px;font-family:var(--D);font-weight:300;color:var(--t1);margin-bottom:14px;letter-spacing:0.3px}
.je-modal-t{font-size:15px;font-family:var(--D);font-weight:300;color:var(--t2);line-height:1.85;white-space:pre-wrap;letter-spacing:0.15px}
.toast{position:fixed;bottom:calc(58px + var(--safe-bottom) + 8px);left:50%;transform:translateX(-50%) translateY(10px);background:var(--k5);border:1px solid var(--w3);border-radius:20px;padding:7px 18px;font-size:12px;color:var(--t2);z-index:400;opacity:0;transition:all 0.25s;white-space:nowrap;pointer-events:none}
.toast.s{opacity:1;transform:translateX(-50%) translateY(0)}
.bkt-toast{position:fixed;top:calc(70px + var(--safe-top));right:14px;background:var(--k4);border:1px solid var(--w3);border-radius:10px;padding:9px 13px;font-size:12px;color:var(--t2);z-index:400;opacity:0;transition:all 0.3s;max-width:200px;pointer-events:none;line-height:1.4}
.bkt-toast.s{opacity:1}
.h{display:none!important}
</style>
</head>
<body>
<div id="app">

  <div class="topbar">
    <div class="greeting">Hello, <em>Amritesh</em></div>
    <div class="ibtn" id="settIconBtn">

<script>
'use strict';
let items=JSON.parse(localStorage.getItem('md4_i')||'[]');
let ttasks=JSON.parse(localStorage.getItem('md4_t')||'[]');
let journals=JSON.parse(localStorage.getItem('md4_j')||'[]');
let cBuckets=JSON.parse(localStorage.getItem('md4_b')||'[]');
let cView='home',cFilter='active',editId=null,snoozeId=null,jModalDateKey=null;
let activeVoiceTarget=null,isSending=false;
const DB=[{id:'Work',c:'var(--c3)'},{id:'Personal',c:'var(--c2)'},{id:'Watch / Read',c:'var(--c1)'},{id:'Creative',c:'var(--c4)'},{id:'Health',c:'var(--c5)'},{id:'Finance',c:'var(--t3)'}];
const allB=()=>[...DB,...cBuckets];
(function(){const k=new Date().toDateString(),h=new Date().getHours();if(localStorage.getItem('md4_td')!==k&&h>=6){ttasks=[];localStorage.setItem('md4_t','[]');localStorage.setItem('md4_td',k);}})();
if(!items.length){items=[{id:gid(),title:'Q3 review with Priya',bucket:'Work',dueDate:new Date(Date.now()+7200000).toISOString(),timeframe:null,status:'active',createdAt:new Date().toISOString(),priority:'high',source:'demo'},{id:gid(),title:'Watch Interstellar',bucket:'Watch / Read',dueDate:null,timeframe:'This week',status:'active',createdAt:new Date().toISOString(),priority:'low',source:'demo'},{id:gid(),title:'Start YouTube channel on productivity',bucket:'Creative',dueDate:null,timeframe:'Someday',status:'active',createdAt:new Date().toISOString(),priority:'low',source:'demo'}];save();}
function save(){localStorage.setItem('md4_i',JSON.stringify(items));syncPush();}
function saveT(){localStorage.setItem('md4_t',JSON.stringify(ttasks));}
function saveJ(){localStorage.setItem('md4_j',JSON.stringify(journals));}
function saveB(){localStorage.setItem('md4_b',JSON.stringify(cBuckets));}
function gid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function isToday(d){const n=new Date();return d.getDate()===n.getDate()&&d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear();}
function isTomorrow(d){const t=new Date();t.setDate(t.getDate()+1);return d.getDate()===t.getDate()&&d.getMonth()===t.getMonth();}
function fmt(d){if(isToday(d))return'Today '+d.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});if(isTomorrow(d))return'Tomorrow '+d.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});return d.toLocaleDateString([],{day:'numeric',month:'short'})+' '+d.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('s');setTimeout(()=>t.classList.remove('s'),2400);}
function bktToast(m){const t=document.getElementById('bktToast');t.textContent=m;t.classList.add('s');setTimeout(()=>t.classList.remove('s'),4000);}

// ── TAB SWITCHING — exact v3base pattern ──
function mobileTab(tab,el){
  document.querySelectorAll('.mtab').forEach(t=>t.classList.remove('on'));
  if(el)el.classList.add('on');
  const center=document.getElementById('centerPanel');
  const chat=document.getElementById('chatPanel');
  if(tab==='add'){
    center.classList.remove('mobile-active');
    chat.classList.add('mobile-active');
  } else {
    center.classList.add('mobile-active');
    chat.classList.remove('mobile-active');
    if(tab==='settings')setView('settings');
    else if(tab==='journal')setView('journal');
    else if(tab==='today')setView('today');
    else setView('home');
  }
}
document.getElementById('settIconBtn').onclick=()=>mobileTab('settings',document.getElementById('tab-settings'));

function setView(v){
  cView=v;
  document.getElementById('pgName').textContent={home:'Home',today:'Today',journal:'Journal',settings:'Settings'}[v]||v;
  const showPills=v==='home'||v==='all';
  document.getElementById('pillActive').style.display=showPills?'':'none';
  document.getElementById('pillAll').style.display=showPills?'':'none';
  render();
}
function setFilter(f,el){cFilter=f;document.querySelectorAll('.pill').forEach(p=>p.classList.remove('on'));if(el)el.classList.add('on');render();}

function render(){
  if(cView==='journal'){renderJournal();return;}
  if(cView==='settings'){renderSettings();return;}
  if(cView==='today'){renderTodayPage();return;}
  const area=document.getElementById('cardsArea');
  const now=new Date();
  let list=cFilter==='active'?items.filter(i=>i.status!=='done'):items;
  if(cView!=='home')list=list.filter(i=>i.bucket===cView);
  const actT=items.filter(i=>i.status==='active').length,dnT=items.filter(i=>i.status==='done').length,todT=ttasks.filter(t=>!t.done).length;
  let html=`<div class="stats"><div class="sc"><div class="sn">${actT}</div><div class="sl">Active</div></div><div class="sc"><div class="sn">${todT}</div><div class="sl">Today</div></div><div class="sc"><div class="sn">${dnT}</div><div class="sl">Done</div></div></div>`;
  if(cView==='home'){
    const ds=new Date().toLocaleDateString([],{weekday:'long',month:'long',day:'numeric'});
    const rows=ttasks.length?ttasks.map((t,i)=>`<div class="tir"><div class="tck${t.done?' ck':''}" onclick="toggleTask(${i})"><svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg></div><div class="tit${t.done?' dn':''}">${esc(t.text)}</div><button class="tdl" onclick="removeTask(${i})">×</button></div>`).join(''):`<div style="font-size:11.5px;color:var(--t4);font-weight:300">Use "Today list" tab in Add →</div>`;
    html+=`<div class="tb"><div class="tbh"><div class="tbt">Today</div><div class="tbd">${ds}</div></div><div class="tbl">${rows}</div></div>`;
    const ov=items.filter(i=>i.status==='active'&&i.dueDate&&new Date(i.dueDate)<now&&!isToday(new Date(i.dueDate)));
    if(ov.length)html+=`<div class="ov-bar" onclick="mobileTab('today',document.getElementById('tab-today'))">${ov.length} overdue — tap to review</div>`;
  }
  if(!list.length){area.innerHTML=html+`<div class="em">Nothing here yet</div>`;return;}
  html+=renderGroups(list);
  area.innerHTML=html;
}

function renderGroups(list){
  const grps={};list.forEach(i=>{const k=i.bucket||'Other';if(!grps[k])grps[k]=[];grps[k].push(i);});
  const ord=[...allB().map(b=>b.id).filter(k=>grps[k]),...Object.keys(grps).filter(k=>!allB().map(b=>b.id).includes(k))];
  return ord.map(key=>{if(!grps[key])return'';const bc=(allB().find(b=>b.id===key)||{c:'var(--t4)'}).c;return`<div class="gc"><div class="gh" onclick="this.closest('.gc').classList.toggle('col')"><div class="glbl" style="color:${bc}">${esc(key)}</div><span class="gcnt">${grps[key].length}</span><div class="gchev"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg></div></div><div class="gitems">${grps[key].map(renderItem).join('')}</div></div>`;}).join('');
}
function renderItem(item){
  const dn=item.status==='done';let tl='';
  if(item.dueDate){const d=new Date(item.dueDate);const ov=d<new Date()&&!isToday(d);tl=`<div class="gtime" style="${ov?'color:var(--red)':''}">${fmt(d)}</div>`;}
  else if(item.timeframe)tl=`<div class="gtime">${item.timeframe}</div>`;
  const acts=dn?`<button class="ab" onclick="restoreItem('${item.id}')">Restore</button>`:`<button class="ab" onclick="doneItem('${item.id}')">Done</button><button class="ab" onclick="openEdit('${item.id}')">Edit</button>${item.dueDate?`<button class="ab" onclick="openSnooze('${item.id}')">Reschedule</button>`:''}<button class="ab" onclick="removeItem('${item.id}')">Remove</button>`;
  return`<div class="gi"><div class="gbul" style="${dn?'opacity:0.1':''}"></div><div class="gbody"><div class="gtxt" style="${dn?'text-decoration:line-through;opacity:0.3':''}">${esc(item.title)}</div>${tl}<div class="gact">${acts}</div></div></div>`;
}

function renderTodayPage(){
  const area=document.getElementById('cardsArea');const now=new Date();
  const ds=now.toLocaleDateString([],{weekday:'long',day:'numeric',month:'long'});
  const schedule=items.filter(i=>i.status==='active'&&i.dueDate&&isToday(new Date(i.dueDate))).sort((a,b)=>new Date(a.dueDate)-new Date(b.dueDate));
  const overdue=items.filter(i=>i.status==='active'&&i.dueDate&&new Date(i.dueDate)<now&&!isToday(new Date(i.dueDate)));
  const actT=items.filter(i=>i.status==='active').length,dnT=items.filter(i=>i.status==='done').length,todT=ttasks.filter(t=>!t.done).length;
  let html=`<div class="stats"><div class="sc"><div class="sn">${actT}</div><div class="sl">Active</div></div><div class="sc"><div class="sn">${todT}</div><div class="sl">Today</div></div><div class="sc"><div class="sn">${dnT}</div><div class="sl">Done</div></div></div>`;
  if(overdue.length)html+=`<div class="ov-bar">${overdue.length} overdue</div>`;
  html+=`<div class="td-section"><div class="td-sh"><div class="td-sl">Today's schedule</div><div class="td-sd">${ds}</div></div>`;
  if(schedule.length)html+=schedule.map(item=>{const d=new Date(item.dueDate);const bc=(allB().find(b=>b.id===item.bucket)||{c:'var(--t4)'}).c;return`<div class="td-item ${d<now?'td-past':''}"><div class="td-time">${d.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'})}</div><div class="td-line" style="background:${bc}"></div><div class="td-body"><div class="td-title">${esc(item.title)}</div><div class="td-bucket" style="color:${bc}">${esc(item.bucket)}</div><div class="td-acts"><button class="ab" onclick="doneItem('${item.id}')">Done</button><button class="ab" onclick="openEdit('${item.id}')">Edit</button><button class="ab" onclick="openSnooze('${item.id}')">Reschedule</button></div></div></div>`;}).join('');
  else html+=`<div style="font-size:12.5px;color:var(--t4);padding:14px 0;font-style:italic;font-family:var(--D)">Nothing scheduled for today</div>`;
  html+=`</div><div class="td-section"><div class="td-sh"><div class="td-sl">Tasks</div></div>`;
  if(ttasks.length)html+=ttasks.map((t,i)=>`<div class="tir" style="padding:8px 15px"><div class="tck${t.done?' ck':''}" onclick="toggleTask(${i})"><svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg></div><div class="tit${t.done?' dn':''}">${esc(t.text)}</div><button class="tdl" onclick="removeTask(${i})">×</button></div>`).join('');
  else html+=`<div style="font-size:12px;color:var(--t4);padding:10px 15px;font-style:italic;font-family:var(--D)">Use "Today list" tab in Add →</div>`;
  html+=`</div>`;area.innerHTML=html;
}

function renderJournal(){
  const area=document.getElementById('cardsArea');
  const ds=new Date().toLocaleDateString([],{weekday:'long',day:'numeric',month:'long',year:'numeric'}).toUpperCase();
  let html=`<div class="jwrite"><div class="jdate">${ds}</div><input class="jhead-in" id="jH" type="text" placeholder="Title your entry..."/><div class="jdiv"></div><textarea class="jbody-in" id="jB" placeholder="Write freely, no limits..."></textarea><div class="jftr"><button class="jsave" onclick="saveJournal()">Save entry</button></div></div>`;
  const sorted=[...journals].sort((a,b)=>new Date(b.date)-new Date(a.date));
  if(sorted.length){html+=`<div class="jlbl">Saved entries</div>`;html+=sorted.map(j=>{const preview=(j.text||'').slice(0,120).replace(/\n/g,' ');const jd=new Date(j.date);const ds2=(jd.toDateString()===new Date().toDateString()?'Today, ':'')+jd.toLocaleDateString([],{day:'numeric',month:'short'})+' · '+jd.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});return`<div class="je-card"><div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px"><div onclick="openJModal('${j.date}')" style="flex:1"><div class="je-date">${ds2}</div>${j.heading?`<div class="je-title">${esc(j.heading)}</div>`:''}<div class="je-preview">${esc(preview)}${(j.text||'').length>120?'…':''}</div></div><button onclick="deleteJournal('${j.date}')" style="background:none;border:none;color:var(--t4);cursor:pointer;font-size:18px;padding:0 2px;flex-shrink:0;line-height:1">×</button></div></div>`;}).join('');}
  area.innerHTML=html;
}
function saveJournal(){const h=document.getElementById('jH')?.value?.trim()||'';const t=document.getElementById('jB')?.value?.trim()||'';if(!t&&!h){toast('Nothing to save');return;}let key;if(window._editingJDate){key=window._editingJDate;const i=journals.findIndex(j=>j.date===key);const entry={date:key,heading:h,text:t};if(i>=0)journals[i]=entry;else journals.unshift(entry);window._editingJDate=null;}else{key=new Date().toISOString();journals.unshift({date:key,heading:h,text:t});}saveJ();toast('Entry saved');renderJournal();}
function deleteJournal(dateKey){if(!confirm('Delete this entry?'))return;journals=journals.filter(j=>j.date!==dateKey);saveJ();renderJournal();toast('Deleted');}
function openJModal(dateKey){const j=journals.find(e=>e.date===dateKey);if(!j)return;jModalDateKey=dateKey;const ds=new Date(j.date).toLocaleDateString([],{weekday:'long',day:'numeric',month:'long',year:'numeric'});document.getElementById('jModalDate').textContent=ds;const mh=document.getElementById('jModalH');mh.textContent=j.heading||'';mh.style.display=j.heading?'block':'none';document.getElementById('jModalT').textContent=j.text||'';document.getElementById('jModal').classList.remove('h');}

  area.innerHTML=`<div class="sett-lbl">Settings</div><div class="sg" style="margin-bottom:10px"><div class="sgh">AI Configuration</div><div class="sr"><div><div class="srl">AI Engine</div><div class="srs">Gemini 2.0 Flash — free via server</div></div><span style="color:var(--ok);font-size:11px">Active ✓</span></div><div class="sr"><div><div class="srl">API Key location</div><div class="srs">Set GEMINI_API_KEY in Vercel → Settings → Environment Variables</div></div><span style="font-size:18px">🔑</span></div></div><div class="sg" style="margin-bottom:10px"><div class="sgh">Notifications</div><div class="sr"><div><div class="srl">Reminder notifications</div><div class="srs">Browser push alerts for time-sensitive items</div></div><div class="tog${settToggles.reminder?' on':''}" onclick="toggleSett('reminder',this)"></div></div><div class="sr"><div><div class="srl">15-min pre-reminder</div><div class="srs">Get alerted 15 minutes before meetings</div></div><div class="tog${settToggles.prereminder?' on':''}" onclick="toggleSett('prereminder',this)"></div></div><div class="sr"><div><div class="srl">Overdue check-in</div><div class="srs">Ask if past-due items are done when you open app</div></div><div class="tog${settToggles.overdue?' on':''}" onclick="toggleSett('overdue',this)"></div></div></div><div class="sg" style="margin-bottom:10px"><div class="sgh">Push Setup</div><div class="sr"><div><div class="srl">Push notifications</div><div class="srs">Requires VAPID keys on server</div></div>${ps}</div><div class="sr"><div><div class="srl">iOS: After enabling</div><div class="srs">Settings → Notifications → MindDump → Allow</div></div></div></div><div class="sg" style="margin-bottom:10px"><div class="sgh">Data</div><div class="sr" style="cursor:pointer" onclick="exportData()"><div class="srl">Export all items as JSON</div><span style="color:var(--t4);font-size:13px">→</span></div><div class="sr" style="cursor:pointer" onclick="if(confirm('Clear done items?'))clearDone()"><div class="srl">Clear all done items</div><span style="color:var(--t4);font-size:13px">→</span></div><div class="sr" style="cursor:pointer" onclick="if(confirm('Delete ALL data?'))nukeAll()"><div><div class="srl" style="color:var(--red)">Reset all data</div><div class="srs">Cannot be undone</div></div><span style="color:var(--red);font-size:13px">→</span></div></div><div class="sg" style="margin-bottom:10px"><div class="sgh">About</div><div class="sr"><div class="srl">MindDump</div><span style="font-size:11px;color:var(--t4)">v4.0</span></div></div>`;
}
function toggleSett(key,el){settToggles[key]=!settToggles[key];el.classList.toggle('on',settToggles[key]);saveToggles();}

function renderTodayList(){const el=document.getElementById('ttList');if(!el)return;el.innerHTML=ttasks.map((t,i)=>`<div class="tt-row"><div class="tt-ck${t.done?' ck':''}" onclick="toggleTask(${i})"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg></div><div class="tt-txt${t.done?' dn':''}">${esc(t.text)}</div><button class="tt-del" onclick="removeTask(${i})">×</button></div>`).join('');}
function toggleTask(i){ttasks[i].done=!ttasks[i].done;saveT();renderTodayList();if(cView==='today')renderTodayPage();if(cView==='home')render();}
function removeTask(i){ttasks.splice(i,1);saveT();renderTodayList();if(cView==='today')renderTodayPage();if(cView==='home')render();}
function addTodayTask(){const inp=document.getElementById('tiInput');const v=inp.value.trim();if(!v)return;ttasks.push({id:gid(),text:v,done:false});inp.value='';inp.style.height='auto';saveT();renderTodayList();toast('Added to today');}

function switchChat(pane){document.querySelectorAll('.ctab').forEach(t=>t.classList.remove('on'));document.querySelectorAll('.chat-pane').forEach(p=>p.classList.remove('on'));document.getElementById('ct-'+pane).classList.add('on');document.getElementById('pane-'+pane).classList.add('on');}
function addMsg(txt,who){const msgs=document.getElementById('msgs');const all=msgs.querySelectorAll('.cm');if(all.length>50)all[0].remove();const d=document.createElement('div');d.className='cm c'+who;const t=new Date().toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});d.innerHTML=`<div class="cb">${txt}</div><div class="ct">${who==='u'?'You · ':''}${t}</div>`;msgs.appendChild(d);requestAnimationFrame(()=>msgs.scrollTop=msgs.scrollHeight);}
function showTyping(){const msgs=document.getElementById('msgs');if(msgs.querySelector('#tyi'))return;const d=document.createElement('div');d.className='cm ca';d.id='tyi';d.innerHTML='<div class="cb"><div class="typing"><div class="dt"></div><div class="dt"></div><div class="dt"></div></div></div>';msgs.appendChild(d);requestAnimationFrame(()=>msgs.scrollTop=msgs.scrollHeight);}
function hideTyping(){document.getElementById('tyi')?.remove();}

async function sendMsg(){
  if(isSending)return;const val=document.getElementById('ci').value.trim();if(!val)return;
  document.getElementById('ci').value='';document.getElementById('ci').style.height='auto';
  isSending=true;document.getElementById('sendBtn').disabled=true;addMsg(esc(val),'u');showTyping();
  let result={};try{const r=await fetch('/api/classify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:val})});if(r.ok)result=await r.json();}catch(e){}
  hideTyping();const{dueDate,timeframe,priority}=parseDateTime(val);const bucket=result.bucket||detectBucket(val);
  const item={id:gid(),title:result.title||val,bucket,dueDate,timeframe:dueDate?null:(result.timeframe||timeframe),status:'active',createdAt:new Date().toISOString(),priority:result.priority||priority,source:'chat'};
  items.unshift(item);const newBkt=checkAutoSubBucket(val,bucket);if(newBkt)item.bucket=newBkt;save();
  let rep=`Saved to <b>${esc(item.bucket)}</b>`;if(dueDate)rep+=` · ${fmt(new Date(dueDate))}`;else if(item.timeframe)rep+=` · ${item.timeframe}`;addMsg(rep,'a');
  isSending=false;document.getElementById('sendBtn').disabled=false;if(cView==='home'||cView==='today')render();
}

tiEl.addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,80)+'px';});
tiEl.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();addTodayTask();}});

function doneItem(id){const i=items.find(x=>x.id===id);if(i){i.status='done';i.doneAt=new Date().toISOString();}save();toast('Done ✓');render();}
function removeItem(id){items=items.filter(x=>x.id!==id);save();toast('Removed');render();}
function restoreItem(id){const i=items.find(x=>x.id===id);if(i){i.status='active';delete i.doneAt;}save();toast('Restored');render();}
function openEdit(id){editId=id;const item=items.find(x=>x.id===id);if(!item)return;const sel=document.getElementById('eB');sel.innerHTML=allB().map(b=>`<option value="${esc(b.id)}">${esc(b.id)}</option>`).join('')+'<option value="Other">Other</option>';document.getElementById('eT').value=item.title||'';sel.value=item.bucket||'Other';document.getElementById('eP').value=item.priority||'low';document.getElementById('eD').value=item.dueDate?new Date(item.dueDate).toISOString().slice(0,16):'';document.getElementById('eTF').value=item.timeframe||'';document.getElementById('editModal').classList.remove('h');}
function closeEditModal(){document.getElementById('editModal').classList.add('h');editId=null;}
function saveEditModal(){const item=items.find(x=>x.id===editId);if(!item){closeEditModal();return;}item.title=document.getElementById('eT').value.trim()||item.title;item.bucket=document.getElementById('eB').value;item.priority=document.getElementById('eP').value;const dt=document.getElementById('eD').value;item.dueDate=dt?new Date(dt).toISOString():null;item.timeframe=document.getElementById('eTF').value||null;closeEditModal();save();toast('Updated');render();}
function openSnooze(id){snoozeId=id;document.getElementById('snoozeModal').classList.remove('h');}
function closeSnooze(){document.getElementById('snoozeModal').classList.add('h');snoozeId=null;}
document.getElementById('snOpt').addEventListener('change',function(){document.getElementById('snDate').classList.toggle('h',this.value!=='custom');});
function confirmSnooze(){const item=items.find(x=>x.id===snoozeId);if(!item){closeSnooze();return;}const opt=document.getElementById('snOpt').value;const base=item.dueDate?new Date(item.dueDate):new Date();if(opt==='30m'){base.setMinutes(base.getMinutes()+30);item.dueDate=base.toISOString();}else if(opt==='1h'){base.setHours(base.getHours()+1);item.dueDate=base.toISOString();}else if(opt==='tomorrow'){const t=new Date(base);t.setDate(t.getDate()+1);item.dueDate=t.toISOString();}else if(opt==='nextweek'){const t=new Date(base);t.setDate(t.getDate()+7);item.dueDate=t.toISOString();}else if(opt==='custom'){const v=document.getElementById('snDate').value;if(v)item.dueDate=new Date(v).toISOString();}closeSnooze();save();toast('Rescheduled');render();}
function closeBucketModal(){document.getElementById('bucketModal').classList.add('h');}

function exportData(){const b=new Blob([JSON.stringify({items,ttasks,journals,cBuckets},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='minddump.json';a.click();}
function clearDone(){items=items.filter(i=>i.status!=='done');save();renderSettings();toast('Done items cleared');}
function nukeAll(){items=[];ttasks=[];journals=[];cBuckets=[];save();saveT();saveJ();saveB();renderSettings();toast('Reset complete');}

function parseDateTime(text){const l=text.toLowerCase(),now=new Date();let h=null,m=0;const tRe=/(?:before|by|at|@|around)?\s*(\d{1,2})(?:[:.:](\d{2}))?\s*(am|pm)/i;const tm=l.match(tRe);if(tm){h=parseInt(tm[1]);m=parseInt(tm[2]||'0');if(tm[3].toLowerCase()==='pm'&&h<12)h+=12;if(tm[3].toLowerCase()==='am'&&h===12)h=0;}if(!tm){const t24=l.match(/(?:at|by|before)?\s*(\d{1,2}):(\d{2})(?!\s*[ap]m)/);if(t24){h=parseInt(t24[1]);m=parseInt(t24[2]);}}if(!tm&&h===null){if(/midnight/.test(l))h=0;else if(/noon|midday/.test(l))h=12;else if(/morning/.test(l))h=9;else if(/afternoon/.test(l))h=14;else if(/evening/.test(l))h=18;else if(/night/.test(l))h=21;}const dh=h!==null?h:9;const mk=d=>{const r=new Date(d);r.setHours(dh,m,0,0);return r;};if(/\btoday\b|\btonight\b|\bnow\b|\burgent\b|\basap\b/.test(l)){const d=mk(now);if(h===null)d.setHours(23,59,0,0);return{dueDate:d.toISOString(),timeframe:null,priority:'high'};}if(/\btomorrow\b/.test(l)){const d=new Date(now);d.setDate(d.getDate()+1);return{dueDate:mk(d).toISOString(),timeframe:null,priority:'high'};}const days={sunday:0,monday:1,tuesday:2,wednesday:3,thursday:4,friday:5,saturday:6,sun:0,mon:1,tue:2,wed:3,thu:4,fri:5,sat:6};for(const[n,dw]of Object.entries(days)){if(new RegExp('\\b'+n+'\\b').test(l)){const d=new Date(now);let diff=dw-d.getDay();const nIdx=l.indexOf(n);const isNext=nIdx>0&&/next\s*$/.test(l.slice(0,nIdx));if(diff<=0||isNext)diff+=7;d.setDate(d.getDate()+diff);return{dueDate:mk(d).toISOString(),timeframe:null,priority:'high'};}}if(h!==null){const d=new Date(now);d.setHours(h,m,0,0);if(d<now)d.setDate(d.getDate()+1);return{dueDate:d.toISOString(),timeframe:null,priority:'high'};}if(/this week|end of week/.test(l))return{dueDate:null,timeframe:'This week',priority:'medium'};if(/this month|end of month/.test(l))return{dueDate:null,timeframe:'This month',priority:'medium'};return{dueDate:null,timeframe:'Someday',priority:'low'};}
function detectBucket(text){const l=text.toLowerCase();for(const b of cBuckets){if(l.split(/\s+/).some(w=>w===b.id.toLowerCase()))return b.id;}if(/meeting|work|office|project|deadline|client|report|email|boss/.test(l))return'Work';if(/watch|movie|film|series|show|netflix|read|book|podcast/.test(l))return'Watch / Read';if(/gym|doctor|medicine|health|workout|diet|sleep|hospital/.test(l))return'Health';if(/paint|draw|art|music|write|create|design|build|channel|idea|youtube/.test(l))return'Creative';if(/money|pay|bill|invest|bank|emi|expense|salary|tax/.test(l))return'Finance';if(/remind|call|pick|buy|order|shop|family|wife|kids|home|birthday/.test(l))return'Personal';return'Other';}
function checkAutoSubBucket(text,bucket){const l=text.toLowerCase();const stop=new Set(['the','and','for','this','that','with','have','will','want','just','some','make','need']);const words=l.replace(/[^a-z\s]/g,'').split(/\s+/).filter(w=>w.length>=4&&!stop.has(w));for(const word of words){const matches=items.filter(i=>i.bucket===bucket&&i.status==='active'&&i.title.toLowerCase().includes(word));if(matches.length>=3){const exists=cBuckets.some(b=>b.id.toLowerCase()===word);const isDefault=DB.some(b=>b.id.toLowerCase().includes(word));if(!exists&&!isDefault){const name=word.charAt(0).toUpperCase()+word.slice(1);const cols=['var(--c1)','var(--c2)','var(--c3)','var(--c4)','var(--c5)'];cBuckets.push({id:name,c:cols[cBuckets.length%cols.length],auto:true});saveB();bktToast('"'+name+'" bucket created automatically');return name;}}}return null;}

let voiceRec=null,audioCtx=null,analyser=null,waveRAF=null;
function startVoice(targetInput){const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){toast('Voice not supported');return;}activeVoiceTarget=targetInput;document.getElementById('voiceOverlay').classList.remove('h');document.getElementById('voiceTranscript').textContent='Speak now...';startWaveform();voiceRec=new SR();voiceRec.lang='en-IN';voiceRec.interimResults=true;voiceRec.maxAlternatives=1;voiceRec.continuous=false;voiceRec.onresult=function(e){let interim='',final='';for(let i=e.resultIndex;i<e.results.length;i++){if(e.results[i].isFinal)final+=e.results[i][0].transcript;else interim+=e.results[i][0].transcript;}document.getElementById('voiceTranscript').textContent=final||interim||'Listening...';if(final){activeVoiceTarget.value=final;activeVoiceTarget.style.height='auto';activeVoiceTarget.style.height=Math.min(activeVoiceTarget.scrollHeight,80)+'px';}};voiceRec.onspeechend=()=>voiceRec.stop();voiceRec.onend=()=>stopVoice();voiceRec.onerror=(e)=>{toast(e.error==='not-allowed'?'Mic blocked — allow in Safari settings':e.error==='no-speech'?'No speech heard':'Voice error');stopVoice();};try{voiceRec.start();}catch(e){toast('Could not start mic');stopVoice();}}
function stopVoice(){if(voiceRec){try{voiceRec.stop();}catch(e){}voiceRec=null;}stopWaveform();document.getElementById('voiceOverlay').classList.add('h');activeVoiceTarget=null;}
function startWaveform(){if(!navigator.mediaDevices)return;navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{audioCtx=new(window.AudioContext||window.webkitAudioContext)();analyser=audioCtx.createAnalyser();analyser.fftSize=256;const src=audioCtx.createMediaStreamSource(stream);src.connect(analyser);animateWave();}).catch(()=>{});}
function animateWave(){if(!analyser)return;const bars=document.querySelectorAll('.wbar');const data=new Uint8Array(analyser.frequencyBinCount);function frame(){waveRAF=requestAnimationFrame(frame);analyser.getByteFrequencyData(data);bars.forEach((b,i)=>{const idx=Math.floor((i/bars.length)*data.length*0.5);const val=data[idx]/255;const h=Math.max(4,val*60);b.style.height=h+'px';b.style.opacity=0.3+val*0.7;});}frame();}
function stopWaveform(){if(waveRAF)cancelAnimationFrame(waveRAF);if(audioCtx){try{audioCtx.close();}catch(e){}audioCtx=null;analyser=null;}}
document.getElementById('micBtn1').onclick=()=>startVoice(document.getElementById('ci'));
document.getElementById('micBtn2').onclick=()=>startVoice(document.getElementById('tiInput'));

async function setupPush(){if(!('serviceWorker'in navigator&&'PushManager'in window)){toast('Push not supported');return;}try{const perm=await Notification.requestPermission();if(perm!=='granted'){toast('Permission denied');return;}const reg=await navigator.serviceWorker.ready;const vapidKey=await getVapidKey();if(!vapidKey){toast('VAPID key not configured');return;}const sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:urlB64ToUint8(vapidKey)});localStorage.setItem('push_sub',JSON.stringify(sub));await syncPushToServer(sub);renderSettings();toast('Push enabled!');}catch(e){toast('Setup failed: '+e.message);}}
async function getVapidKey(){try{const r=await fetch('/api/push?action=vapid');if(r.ok){const d=await r.json();return d.publicKey||null;}}catch(e){}return null;}
async function syncPushToServer(sub){try{await fetch('/api/push',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({subscription:sub,reminders:items.filter(i=>i.status==='active'&&i.dueDate),userId:getUserId()})});}catch(e){}}
async function syncPush(){const s=localStorage.getItem('push_sub');if(!s)return;try{await syncPushToServer(JSON.parse(s));}catch(e){}}
function getUserId(){let id=localStorage.getItem('md_uid');if(!id){id=gid();localStorage.setItem('md_uid',id);}return id;}
function urlB64ToUint8(b64){const p=b64.replace(/-/g,'+').replace(/_/g,'/');const r=atob(p);const o=new Uint8Array(r.length);for(let i=0;i<r.length;i++)o[i]=r.charCodeAt(i);return o;}
if('serviceWorker'in navigator){navigator.serviceWorker.register('/sw.js').catch(()=>{});}

// ── INIT ──
setView('home');
renderTodayList();
setTimeout(syncPush,2000);
