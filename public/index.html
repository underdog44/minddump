// ── HELPERS ──
function save(){localStorage.setItem('minddump_v2',JSON.stringify(items));updateBadges();renderCards();}
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function isToday(d){const n=new Date();return d.getDate()===n.getDate()&&d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear();}
function formatDue(d){
  if(isToday(d))return'Today '+d.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});
  const tm=new Date();tm.setDate(tm.getDate()+1);
  if(d.getDate()===tm.getDate()&&d.getMonth()===tm.getMonth())return'Tomorrow '+d.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});
  return d.toLocaleDateString([],{month:'short',day:'numeric'})+' '+d.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});
}
function pad(n){return String(n).padStart(2,'0');}
function guessBucket(t){
  const l=t.toLowerCase();
  if(/meeting|work|project|deadline|client|office|task|report|email|boss/.test(l))return'Work';
  if(/watch|movie|show|series|netflix|read|book|podcast|film/.test(l))return'Watch / Read';
  if(/gym|doctor|medicine|health|workout|diet|sleep|hospital/.test(l))return'Health';
  if(/idea|start|build|create|channel|design|art|music|write/.test(l))return'Creative';
  if(/money|pay|bill|buy|order|shop|invest|bank|emi/.test(l))return'Finance';
  return'Personal';
}

// ── RENDER ──
function renderCards(){
  const area=document.getElementById('cardsArea');
  const list=getFilteredItems();
  if(!list.length){
    area.innerHTML=`<div class="es"><div class="ei">${currentView==='done'?'✅':'🌱'}</div><div class="et">${currentView==='done'?'Nothing done yet':'All clear'}</div><div style="font-size:12px;color:var(--muted)">${currentView==='done'?'Complete items appear here':'Drop a thought in the chat →'}</div></div>`;
    return;
  }
  const now=new Date();
  const ov=list.filter(i=>i.status==='active'&&i.dueDate&&new Date(i.dueDate)<now&&!isToday(new Date(i.dueDate)));
  const td=list.filter(i=>i.status==='active'&&i.dueDate&&isToday(new Date(i.dueDate)));
  const up=list.filter(i=>i.status==='active'&&i.dueDate&&new Date(i.dueDate)>now&&!isToday(new Date(i.dueDate)));
  const nd=list.filter(i=>i.status==='active'&&!i.dueDate);
  const dn=list.filter(i=>i.status==='done');
  let html='';
  if(ov.length)html+=`<div class="ob" onclick="setView('all')">⚠️ ${ov.length} overdue — tap to review</div>`;
  [{l:'overdue',a:ov},{l:'due today',a:td},{l:'upcoming',a:up},{l:'ideas & no deadline',a:nd},{l:'done',a:dn}].forEach(s=>{
    if(!s.a.length)return;
    html+=`<div class="sh">${s.l}</div>`;
    s.a.forEach(item=>{html+=renderCard(item);});
  });
  area.innerHTML=html;
}

function renderCard(item){
  const bc=BUCKET_COLORS[item.bucket]||'ch-gray';
  const bi=BUCKET_ICONS[item.bucket]||'📌';
  const bbg=BUCKET_BG[item.bucket]||'rgba(255,255,255,0.04)';
  const isDone=item.status==='done';
  let tc='';
  if(item.dueDate){const d=new Date(item.dueDate);const ov=d<new Date()&&!isToday(d);tc=`<span class="chip ${ov?'ch-coral':'ch-amber'}">🕐 ${formatDue(d)}</span>`;}
  else if(item.timeframe)tc=`<span class="chip ch-gray">${item.timeframe}</span>`;
  const pc=item.priority==='high'?'phi':item.priority==='medium'?'pmd':item.priority==='low'?'plo':'pno';
  return `<div class="card ${isDone?'dc':''}" id="c-${item.id}">
    <div class="cr">
      <div class="pdot ${pc}"></div>
      <div class="ci" style="background:${bbg}">${bi}</div>
      <div class="cb">
        <div class="ct">${escH(item.title)}</div>
        <div class="cm"><span class="chip ${bc}">${item.bucket}</span>${tc}</div>
        ${!isDone?`<div class="cact">
          <button class="ab done" data-action="done" data-id="${item.id}">✓ Done</button>
          <button class="ab edit" data-action="edit" data-id="${item.id}">✏️ Edit</button>
          ${item.dueDate?`<button class="ab snz" data-action="snz" data-id="${item.id}">⏱ Snooze</button>`:''}
          <button class="ab disc" data-action="disc" data-id="${item.id}">✕</button>
        </div>`:`<div class="cact"><button class="ab" data-action="restore" data-id="${item.id}">↩ Restore</button></div>`}
      </div>
    </div>
  </div>`;
}

function getFilteredItems(){
  let list=items;
  if(currentFilter==='active')list=list.filter(i=>i.status!=='done');
  if(currentView==='today'){
    const active=items.filter(i=>i.status==='active');
    const timed=active.filter(i=>i.dueDate&&(isToday(new Date(i.dueDate))||new Date(i.dueDate)<new Date()));
    const ideas=active.filter(i=>!i.dueDate).slice(0,3);
    const ids=new Set(timed.map(i=>i.id));
    ideas.forEach(i=>{if(!ids.has(i.id))timed.push(i);});
    return timed;
  }
  if(currentView==='all')return list;
  if(currentView==='ideas')return list.filter(i=>!i.dueDate);
  if(currentView==='done')return items.filter(i=>i.status==='done');
  return list.filter(i=>i.bucket===currentView);
}

function updateBadges(){
  const active=items.filter(i=>i.status==='active'),now=new Date();
  const s=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  s('bt',active.filter(i=>i.dueDate&&(isToday(new Date(i.dueDate))||new Date(i.dueDate)<now)).length);
  s('ba',active.length);s('bi',active.filter(i=>!i.dueDate).length);
  s('bd',items.filter(i=>i.status==='done').length);
  s('bWork',active.filter(i=>i.bucket==='Work').length);
  s('bPersonal',active.filter(i=>i.bucket==='Personal').length);
  s('bWatch',active.filter(i=>i.bucket==='Watch / Read').length);
  s('bCreative',active.filter(i=>i.bucket==='Creative').length);
  s('bHealth',active.filter(i=>i.bucket==='Health').length);
  s('bFinance',active.filter(i=>i.bucket==='Finance').length);
}

// ── CARD ACTIONS via delegation ──
document.getElementById('cardsArea').addEventListener('click',e=>{
  const btn=e.target.closest('[data-action]');if(!btn)return;
  const {action,id}=btn.dataset;
  if(action==='done'){const i=items.find(x=>x.id===id);if(i){i.status='done';i.doneAt=new Date().toISOString();}save();showToast('✅ Done!');}
  else if(action==='disc'){if(!confirm('Discard?'))return;items=items.filter(x=>x.id!==id);save();showToast('🗑 Discarded');}
  else if(action==='restore'){const i=items.find(x=>x.id===id);if(i){i.status='active';delete i.doneAt;}save();showToast('↩ Restored');}
  else if(action==='edit')openEdit(id);
  else if(action==='snz'){snoozeTargetId=id;document.getElementById('snzModal').classList.remove('hid');}
});

// ── VIEWS ──
function setView(view){
  currentView=view;
  document.querySelectorAll('.si').forEach(s=>s.classList.remove('active'));
  const si=document.querySelector(`.si[data-view="${view}"]`);if(si)si.classList.add('active');
  const titles={today:'Today',all:'All Reminders',ideas:'Ideas',done:'Done'};
  document.getElementById('pgTitle').textContent=titles[view]||view;
  hideSP();renderCards();
}
document.querySelectorAll('.si').forEach(si=>si.addEventListener('click',()=>setView(si.dataset.view)));
document.getElementById('faBtn').addEventListener('click',function(){currentFilter='active';this.classList.add('active');document.getElementById('fallBtn').classList.remove('active');renderCards();});
document.getElementById('fallBtn').addEventListener('click',function(){currentFilter='all';this.classList.add('active');document.getElementById('faBtn').classList.remove('active');renderCards();});

// ── SETTINGS ──
function showSP(){document.getElementById('spPage').classList.remove('hid');document.getElementById('mainPage').style.display='none';}
function hideSP(){document.getElementById('spPage').classList.add('hid');document.getElementById('mainPage').style.display='';}
document.getElementById('settBtn').addEventListener('click',showSP);
document.getElementById('expBtn').addEventListener('click',()=>{const b=new Blob([JSON.stringify(items,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='minddump.json';a.click();});
document.getElementById('clrBtn').addEventListener('click',()=>{items=items.filter(i=>i.status!=='done');save();showToast('🗑 Done cleared');});
document.getElementById('rstBtn').addEventListener('click',()=>{if(confirm('Delete ALL data?')){items=[];save();}});

// ── ADD MODAL ──
document.getElementById('addBtn').addEventListener('click',()=>{document.getElementById('addModal').classList.remove('hid');document.getElementById('mTitle').focus();});
document.getElementById('mCancelBtn').addEventListener('click',()=>document.getElementById('addModal').classList.add('hid'));
document.getElementById('mTime').addEventListener('change',function(){document.getElementById('mDatetime').classList.toggle('hid',this.value!=='specific');});
document.getElementById('mSaveBtn').addEventListener('click',()=>{
  const title=document.getElementById('mTitle').value.trim();if(!title)return;
  const bucket=document.getElementById('mBucket').value||guessBucket(title);
  const tv=document.getElementById('mTime').value;
  let dueDate=null,timeframe=null;
  if(tv==='today'){const d=new Date();d.setHours(23,59,0);dueDate=d.toISOString();}
  else if(tv==='specific'){const v=document.getElementById('mDatetime').value;if(v)dueDate=new Date(v).toISOString();}
  else if(tv==='thisweek')timeframe='This week';
  else if(tv==='thismonth')timeframe='This month';
  else if(tv==='someday')timeframe='Someday';
  items.unshift({id:genId(),title,bucket,dueDate,timeframe,status:'active',createdAt:new Date().toISOString(),priority:dueDate?'high':'low',source:'manual'});
  save();document.getElementById('addModal').classList.add('hid');document.getElementById('mTitle').value='';showToast('✅ Added!');
});

// ── EDIT MODAL ──
function openEdit(id){
  editTargetId=id;
  const item=items.find(x=>x.id===id);if(!item)return;
  document.getElementById('eTitle').value=item.title;
  document.getElementById('eBucket').value=item.bucket||'Other';
  document.getElementById('ePriority').value=item.priority||'low';
  document.getElementById('eTimeframe').value=item.timeframe||'';
  if(item.dueDate){const d=new Date(item.dueDate);document.getElementById('eDatetime').value=`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;}
  else document.getElementById('eDatetime').value='';
  document.getElementById('editModal').classList.remove('hid');
}
document.getElementById('eCancelBtn').addEventListener('click',()=>document.getElementById('editModal').classList.add('hid'));
document.getElementById('eSaveBtn').addEventListener('click',()=>{
  const item=items.find(x=>x.id===editTargetId);if(!item)return;
  item.title=document.getElementById('eTitle').value.trim()||item.title;
  item.bucket=document.getElementById('eBucket').value;
  item.priority=document.getElementById('ePriority').value;
  const dt=document.getElementById('eDatetime').value;
  item.dueDate=dt?new Date(dt).toISOString():null;
  item.timeframe=document.getElementById('eTimeframe').value||null;
  if(item.dueDate)item.timeframe=null;
  document.getElementById('editModal').classList.add('hid');save();showToast('✏️ Saved!');
});

// ── SNOOZE MODAL ──
document.getElementById('snzOpt').addEventListener('change',function(){document.getElementById('snzDt').classList.toggle('hid',this.value!=='custom');});
document.getElementById('snzCancel').addEventListener('click',()=>document.getElementById('snzModal').classList.add('hid'));
document.getElementById('snzSave').addEventListener('click',()=>{
  const opt=document.getElementById('snzOpt').value;
  const item=items.find(x=>x.id===snoozeTargetId);if(!item)return;
  const base=item.dueDate?new Date(item.dueDate):new Date();
  if(opt==='30m'){base.setMinutes(base.getMinutes()+30);item.dueDate=base.toISOString();}
  else if(opt==='1h'){base.setHours(base.getHours()+1);item.dueDate=base.toISOString();}
  else if(opt==='tomorrow'){const t=new Date(base);t.setDate(t.getDate()+1);item.dueDate=t.toISOString();}
  else if(opt==='nextweek'){const t=new Date(base);t.setDate(t.getDate()+7);item.dueDate=t.toISOString();}
  else if(opt==='custom'){const v=document.getElementById('snzDt').value;if(v)item.dueDate=new Date(v).toISOString();}
  document.getElementById('snzModal').classList.add('hid');save();showToast('⏰ Rescheduled!');
});

// ── CHAT ──
const chatInput=document.getElementById('chatInput');
chatInput.addEventListener('input',()=>{chatInput.style.height='auto';chatInput.style.height=Math.min(chatInput.scrollHeight,80)+'px';});
chatInput.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}});
document.getElementById('sendBtn').addEventListener('click',sendMsg);

function addMsg(text,who){
  const msgs=document.getElementById('chatMsgs');
  const d=document.createElement('div');d.className='msg '+who;
  const t=new Date().toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});
  d.innerHTML=`<div class="mb">${text}</div><div class="mt">${who==='mu'?'You':t}</div>`;
  msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight;
}
function showTyping(){
  const msgs=document.getElementById('chatMsgs');
  const d=document.createElement('div');d.className='msg ma';d.id='typ';
  d.innerHTML='<div class="mb"><div class="typing"><div class="td"></div><div class="td"></div><div class="td"></div></div></div>';
  msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight;
}

async function sendMsg(){
  const val=chatInput.value.trim();if(!val)return;
  chatInput.value='';chatInput.style.height='auto';
  addMsg(escH(val),'mu');showTyping();
  document.getElementById('sendBtn').disabled=true;
  try{
    const resp=await fetch(window.location.origin+'/api/classify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:val})});
    document.getElementById('typ')?.remove();
    const result=await resp.json();
    const item={id:genId(),title:result.title||val,bucket:result.bucket||'Other',dueDate:result.dueDate||null,timeframe:result.timeframe||null,status:'active',createdAt:new Date().toISOString(),priority:result.priority||'low',source:'chat'};
    items.unshift(item);save();
    let reply=`Got it! ✅ Saved to <b>${item.bucket}</b>`;
    if(item.dueDate)reply+=` — reminder set for <b>${formatDue(new Date(item.dueDate))}</b>`;
    else if(item.timeframe)reply+=` (${item.timeframe})`;
    else reply+=' — no deadline';
    reply+=`<br><span style="font-size:11px;color:var(--muted2);margin-top:2px;display:block">Tap ✏️ Edit on the card to change bucket or time</span>`;
    addMsg(reply,'ma');
    scheduleNotif(item);
  }catch(e){
    document.getElementById('typ')?.remove();
    const item={id:genId(),title:val,bucket:guessBucket(val),dueDate:null,timeframe:'Someday',status:'active',createdAt:new Date().toISOString(),priority:'low',source:'chat'};
    items.unshift(item);save();
    addMsg(`Saved to <b>${item.bucket}</b> <span style="color:var(--muted2);font-size:11px">(offline)</span>`,'ma');
  }
  document.getElementById('sendBtn').disabled=false;
}

function scheduleNotif(item){
  if(!item.dueDate||Notification.permission!=='granted')return;
  const diff=new Date(item.dueDate)-new Date();
  if(diff<=0)return;
  if(diff>900000)setTimeout(()=>new Notification('MindDump',{body:`In 15 min: ${item.title}`,icon:'/icon-192.png'}),diff-900000);
  setTimeout(()=>new Notification('MindDump',{body:`⏰ ${item.title}`,icon:'/icon-192.png'}),diff);
}

// ── MOBILE TABS ──
document.querySelectorAll('.mtb').forEach(btn=>btn.addEventListener('click',function(){
  document.querySelectorAll('.mtb').forEach(t=>t.classList.remove('active'));
  this.classList.add('active');
  const tab=this.dataset.mt;
  const center=document.getElementById('centerPanel'),chat=document.getElementById('chatPanel');
  if(tab==='chat'){center.classList.remove('mon');chat.classList.add('mon');}
  else if(tab==='settings'){center.classList.add('mon');chat.classList.remove('mon');hideSP();showSP();}
  else{center.classList.add('mon');chat.classList.remove('mon');hideSP();const m={cards:'today',all:'all',ideas:'ideas'};setView(m[tab]||tab);}
}));
