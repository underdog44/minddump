<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>MindDump</title>

<style>
:root {
  --bg:#0d0f14;
  --card:#171a22;
  --text:#e8eaf0;
  --muted:#7a8099;
  --border:rgba(255,255,255,0.08);
}

* { box-sizing:border-box; margin:0; padding:0; }

html,body {
  height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  overflow:hidden;
}

/* APP */
#app {
  height:100%;
  display:flex;
  flex-direction:column;
}

/* SCREENS */
#screens {
  flex:1;
  position:relative;
}

.screen {
  position:absolute;
  inset:0;
  display:none;
  flex-direction:column;
}

.screen.active { display:flex; }

/* HEADER */
.header {
  padding:calc(14px + env(safe-area-inset-top)) 16px 10px;
  border-bottom:1px solid var(--border);
}

/* SCROLL */
.scroll {
  flex:1;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding:16px;
  padding-bottom:100px;
}

/* CARD */
.card {
  background:var(--card);
  border-radius:14px;
  padding:14px;
  margin-bottom:10px;
}

/* INPUT BAR */
.input-bar {
  position:fixed;
  left:0;
  right:0;
  bottom:60px;
  padding:10px;
  background:var(--bg);
}

input {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#222;
  color:white;
}

/* NAV */
#nav {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:60px;
  padding-bottom:env(safe-area-inset-bottom);
  background:var(--bg);
  border-top:1px solid var(--border);
  display:flex;
}

.tab {
  flex:1;
  text-align:center;
  padding-top:10px;
  font-size:12px;
  color:var(--muted);
}

.tab.active { color:white; }

button {
  margin-top:10px;
  padding:10px;
  border:none;
  background:#333;
  color:white;
  border-radius:10px;
}
</style>
</head>

<body>

<div id="app">

  <div id="screens">

    <!-- ASK -->
    <div class="screen active" id="ask">
      <div class="header">Brain Dump</div>

      <div class="scroll" id="chatList"></div>

      <div class="input-bar">
        <input id="chatInput" placeholder="Type anything..." />
      </div>
    </div>

    <!-- TODAY -->
    <div class="screen" id="today">
      <div class="header">Today</div>
      <div class="scroll" id="todayList"></div>
    </div>

    <!-- HOME -->
    <div class="screen" id="home">
      <div class="header">Hello, Amritesh</div>
      <div class="scroll" id="homeList"></div>
    </div>

    <!-- JOURNAL -->
    <div class="screen" id="journal">
      <div class="header">Journal</div>

      <div class="scroll">
        <input id="journalInput" placeholder="Write..." />
        <button onclick="saveJournal()">Save</button>

        <div id="journalList"></div>
      </div>
    </div>

    <!-- SETTINGS -->
    <div class="screen" id="settings">
      <div class="header">Settings</div>
      <div class="scroll">
        <div class="card">Export / Reset coming soon</div>
      </div>
    </div>

  </div>

  <!-- NAV -->
  <div id="nav">
    <div class="tab active" onclick="switchScreen('ask',this)">Add</div>
    <div class="tab" onclick="switchScreen('today',this)">Today</div>
    <div class="tab" onclick="switchScreen('home',this)">Home</div>
    <div class="tab" onclick="switchScreen('journal',this)">Journal</div>
    <div class="tab" onclick="switchScreen('settings',this)">Settings</div>
  </div>

</div>

<script>
let state = JSON.parse(localStorage.getItem("minddump") || '{"items":[],"journal":[]}');

function saveState() {
  localStorage.setItem("minddump", JSON.stringify(state));
}

/* SWITCH SCREEN */
function switchScreen(id, el) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');

  document.activeElement.blur();
}

/* CHAT */
document.getElementById("chatInput").addEventListener("keypress", e=>{
  if(e.key==="Enter"){
    let val = e.target.value.trim();
    if(!val) return;

    let item = {
      text: val,
      bucket: classify(val),
      today: val.toLowerCase().includes("today")
    };

    state.items.push(item);
    e.target.value="";
    saveState();
    render();
  }
});

/* SIMPLE AI CLASSIFIER */
function classify(text){
  if(text.includes("watch")) return "Watch";
  if(text.includes("work")) return "Work";
  return "General";
}

/* JOURNAL */
function saveJournal(){
  let val = document.getElementById("journalInput").value;
  if(!val) return;

  state.journal.push(val);
  document.getElementById("journalInput").value="";
  saveState();
  render();
}

/* RENDER */
function render(){

  /* CHAT */
  let chatHTML="";
  state.items.forEach(i=>{
    chatHTML+=`<div class="card">${i.text}</div>`;
  });
  document.getElementById("chatList").innerHTML=chatHTML;

  /* TODAY */
  let todayHTML="";
  state.items.filter(i=>i.today).forEach(i=>{
    todayHTML+=`<div class="card">${i.text}</div>`;
  });
  document.getElementById("todayList").innerHTML=todayHTML;

  /* HOME */
  let homeHTML="";
  state.items.forEach(i=>{
    homeHTML+=`<div class="card">${i.bucket}: ${i.text}</div>`;
  });
  document.getElementById("homeList").innerHTML=homeHTML;

  /* JOURNAL */
  let jHTML="";
  state.journal.forEach(j=>{
    jHTML+=`<div class="card">${j}</div>`;
  });
  document.getElementById("journalList").innerHTML=jHTML;
}

render();
</script>

</body>
</html>
